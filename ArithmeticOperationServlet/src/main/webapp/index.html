<!DOCTYPE html>
<html>
<head>
  <title>Addition Calculator</title>
  <style>
    body 
    { 
      font-family: Arial; 
      margin: 20px; 
    }
    h1 { color: blue; }
    input 
    { 
      padding: 5px; 
      margin: 5px 0; 
      width: 200px; 
    }
    button 
    { 
      padding: 8px 20px; 
      margin: 5px; 
      background-color: green; 
      color: white; 
      border: none; 
      cursor: pointer; 
    }
  </style>
</head>
<body>
  <h1>Addition Calculator</h1>
  <form action="arithmetic" method="post">
    <input type="number" name="a" placeholder="Number 1" required>
    <br>
    <input type="number" name="b" placeholder="Number 2" required>
    <br>
    <button type="submit">Add Numbers</button>
  </form>
</body>
</html>
