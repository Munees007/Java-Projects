<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Prime Number Checking</title>
    <style>
        body 
        { 
            font-family: Arial; 
            margin: 20px; 
        }
        h1 
        { 
            color: blue; 
        }
        input 
        { 
            padding: 5px; 
            margin: 5px 0; 
            width: 200px; 
        }
        button 
        { 
            padding: 8px 20px; 
            background-color: blue; 
            color: white; 
            border: none; 
            cursor: pointer; 
        }
    </style>
</head>
<body>
    <h1>Prime Number Checking</h1>
    <form action="prime" method="post">
        <label>Enter Number</label><br>
        <input type="number" name="num" required>
        <br>
        <button type="submit">Check</button>
    </form>
</body>
</html>
