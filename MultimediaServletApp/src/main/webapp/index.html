<!DOCTYPE html>
<html>
<head>
  <title>Multimedia Servlet</title>
  <style>
    body 
    { 
      font-family: Arial; 
      margin: 20px; 
    }
    h1 
    { 
      color: blue; 
    }
    select 
    { 
      padding: 5px; 
      margin: 5px 0; 
      width: 200px; 
    }
    button 
    { 
      padding: 8px 20px; 
      background-color: blue; 
      color: white; 
      border: none; 
      cursor: pointer; 
    }
  </style>
</head>
<body>
  <h1>Multimedia Servlet</h1>
  <form action="media" method="post">
    <label>Select Media Type</label><br>
    <select name="type" required>
      <option value="">-- Select --</option>
      <option value="image">Image</option>
      <option value="audio">Audio</option>
      <option value="video">Video</option>
    </select>
    <br>
    <button type="submit">Show</button>
  </form>
</body>
</html>
